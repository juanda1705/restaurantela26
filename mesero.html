<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panel Mesero · La 26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1010;
    --bg2: #141614;
    --card: #1a1d1a;
    --card2: #1f231f;
    --green: #4a5a28;
    --green-light: #6a8038;
    --text: #e8e8e2;
    --text2: #78786e;
    --text3: #4a4a42;
    --border: #252820;

    --libre: #2d4a2d;
    --libre-border: #4a7a4a;
    --libre-text: #7ab87a;

    --pendiente: #4a3a10;
    --pendiente-border: #c8941a;
    --pendiente-text: #e8b840;

    --preparando: #4a2a10;
    --preparando-border: #e07020;
    --preparando-text: #f09040;

    --listo: #1a4a2a;
    --listo-border: #20c860;
    --listo-text: #40e880;

    --cuenta: #2a2a30;
    --cuenta-border: #505060;
    --cuenta-text: #9090a0;

    --alerta-bg: #3a1a08;
    --alerta-border: #c85010;

    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── PANTALLA LOGIN ─── */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    padding: 24px;
  }

  .login-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(38px, 10vw, 56px);
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text2);
    text-align: center;
    margin-bottom: 48px;
  }

  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color var(--transition);
    -webkit-appearance: none;
  }

  .field-input:focus { border-color: var(--green-light); }

  .pin-wrapper {
    display: flex;
    gap: 10px;
  }

  .pin-digit {
    flex: 1;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0;
    padding: 14px 0;
    -webkit-text-security: disc;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color var(--transition);
    caret-color: var(--green-light);
    width: 100%;
  }

  .pin-digit:focus { border-color: var(--green-light); }

  .btn-primary {
    width: 100%;
    background: var(--green);
    border: 1px solid var(--green-light);
    border-radius: var(--radius-sm);
    padding: 15px;
    color: #d8e8b0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background var(--transition), transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
  }

  .btn-primary:active { transform: scale(0.98); background: var(--green-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .login-error {
    text-align: center;
    font-size: 13px;
    color: #e07060;
    min-height: 18px;
  }

  /* ─── APP PRINCIPAL ─── */
  #app {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
    flex: 1;
  }

  .topbar-logo span { color: var(--green-light); }

  .topbar-mesero {
    font-size: 12px;
    color: var(--text2);
    text-align: right;
    line-height: 1.3;
  }

  .topbar-mesero strong { color: var(--text); display: block; font-size: 13px; }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all var(--transition);
    min-height: 44px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-logout:hover { border-color: var(--text2); color: var(--text); }

  /* ─── ALERTAS AGOTADOS ─── */
  #alertas-container {
    position: sticky; top: 56px; z-index: 90;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .alerta-item {
    background: var(--alerta-bg);
    border-bottom: 1px solid var(--alerta-border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #f0a060;
    animation: slideDown 0.3s ease;
  }

  .alerta-item .alerta-icon { font-size: 16px; flex-shrink: 0; }
  .alerta-item .alerta-msg { flex: 1; }

  .alerta-dismiss {
    background: none; border: none;
    color: var(--text2); font-size: 18px;
    cursor: pointer; padding: 4px 8px;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ─── MAIN CONTENT ─── */
  .main-content {
    flex: 1;
    padding: 20px 16px 100px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .mesas-count {
    font-size: 12px;
    color: var(--text3);
  }

  /* ─── GRID DE MESAS ─── */
  #mesas-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  @media (min-width: 600px) { #mesas-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px) { #mesas-grid { grid-template-columns: repeat(4, 1fr); } }

  /* ─── TARJETA DE MESA ─── */
  .mesa-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    transition: transform 0.15s, border-color var(--transition);
    animation: fadeUp 0.4s ease both;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    user-select: none;
  }

  .mesa-card:active { transform: scale(0.97); }

  .mesa-card.estado-libre {
    background: var(--libre);
    border-color: var(--libre-border);
  }

  .mesa-card.estado-pendiente {
    background: var(--pendiente);
    border-color: var(--pendiente-border);
  }

  .mesa-card.estado-preparando {
    background: var(--preparando);
    border-color: var(--preparando-border);
  }

  .mesa-card.estado-listo {
    background: var(--listo);
    border-color: var(--listo-border);
    animation: fadeUp 0.4s ease both, pulsoListo 2s ease-in-out infinite;
  }

  .mesa-card.estado-cuenta {
    background: var(--cuenta);
    border-color: var(--cuenta-border);
  }

  @keyframes pulsoListo {
    0%, 100% { box-shadow: 0 0 0 0 rgba(32, 200, 96, 0.0); }
    50% { box-shadow: 0 0 0 6px rgba(32, 200, 96, 0.15); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .mesa-numero {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .mesa-nombre {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }

  .mesa-estado-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  .estado-libre .mesa-estado-badge { background: rgba(74,122,74,0.3); color: var(--libre-text); }
  .estado-pendiente .mesa-estado-badge { background: rgba(200,148,26,0.2); color: var(--pendiente-text); }
  .estado-preparando .mesa-estado-badge { background: rgba(224,112,32,0.2); color: var(--preparando-text); }
  .estado-listo .mesa-estado-badge { background: rgba(32,200,96,0.2); color: var(--listo-text); }
  .estado-cuenta .mesa-estado-badge { background: rgba(80,80,96,0.3); color: var(--cuenta-text); }

  .mesa-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 4px;
  }

  .mesa-timer {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    transition: color 0.3s;
  }

  .mesa-timer.timer-verde { color: #7ab87a; }
  .mesa-timer.timer-amarillo { color: #e8b840; }
  .mesa-timer.timer-naranja { color: #f09040; }
  .mesa-timer.timer-rojo { color: #f06050; animation: timerPulso 1.5s ease-in-out infinite; }

  @keyframes timerPulso {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .mesa-items {
    font-size: 11px;
    color: var(--text3);
    text-align: right;
  }

  .mesa-cliente {
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    margin-bottom: 2px;
  }

  /* ─── SKELETON ─── */
  .mesa-skeleton {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 130px;
    animation: shimmer 1.6s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ─── OVERLAY / DRAWER ─── */
  #overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.65);
    display: none;
    align-items: flex-end;
    -webkit-tap-highlight-color: transparent;
  }

  #overlay.visible { display: flex; }

  /* ─── BOTTOM SHEET / DRAWER ─── */
  .drawer {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    background: var(--card);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    overscroll-behavior: contain;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  .drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .drawer-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .drawer-mesa-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .drawer-mesa-info { flex: 1; }
  .drawer-mesa-nombre { font-size: 12px; color: var(--text2); margin-top: 3px; }

  .btn-close-drawer {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text2); font-size: 20px;
    cursor: pointer; min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all var(--transition);
  }

  .btn-close-drawer:hover { border-color: var(--text2); }

  .drawer-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

  /* ─── ACCIONES DE MESA ─── */
  .drawer-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-accion {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    display: flex; align-items: center; justify-content: center;
    gap: 7px;
    min-height: 44px;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-accion:active { transform: scale(0.97); }
  .btn-accion.primary { background: var(--green); border-color: var(--green-light); color: #d8e8b0; grid-column: 1 / -1; }
  .btn-accion.danger { border-color: #c84030; color: #f08070; }
  .btn-accion.warning { border-color: var(--pendiente-border); color: var(--pendiente-text); }

  /* ─── PEDIDOS ACTIVOS ─── */
  .pedidos-section-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
  }

  .pedido-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .pedido-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .pedido-num { font-size: 12px; color: var(--text2); font-weight: 500; }
  .pedido-hora { font-size: 11px; color: var(--text3); }

  .pedido-status-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .status-pending { background: rgba(200,148,26,0.15); color: var(--pendiente-text); }
  .status-preparing { background: rgba(224,112,32,0.15); color: var(--preparando-text); }
  .status-ready { background: rgba(32,200,96,0.15); color: var(--listo-text); }
  .status-delivered { background: rgba(80,80,96,0.2); color: var(--text2); }

  .pedido-items { padding: 10px 14px; display: flex; flex-direction: column; gap: 7px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }

  .item-qty {
    width: 22px; height: 22px;
    background: var(--card);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
  }

  .item-nombre { flex: 1; color: var(--text); }

  .item-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-pending { background: var(--pendiente-border); }
  .dot-preparing { background: var(--preparando-border); }
  .dot-ready { background: var(--listo-border); }
  .dot-delivered { background: var(--text3); }

  .pedido-total {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    color: var(--text2);
  }

  .pedido-total strong { color: var(--text); }

  /* ─── VISTA TOMAR PEDIDO ─── */
  #vista-pedido {
    display: none;
    position: fixed; inset: 0; z-index: 300;
    background: var(--bg);
    flex-direction: column;
  }

  .pedido-topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }

  .btn-back {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text2); font-size: 20px;
    cursor: pointer; min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .pedido-topbar-title {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }

  .pedido-topbar-mesa { font-size: 12px; color: var(--text2); }

  .pedido-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 160px; }

  /* ─── MENÚ EN VISTA PEDIDO ─── */
  .menu-categoria {
    margin-bottom: 24px;
  }

  .cat-titulo {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .menu-item:last-child { border-bottom: none; }

  .menu-item-info { flex: 1; }
  .menu-item-nombre { font-size: 14px; color: var(--text); font-weight: 500; }
  .menu-item-precio { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .menu-item-agotado { font-size: 11px; color: #f06050; margin-top: 2px; }

  .qty-control {
    display: flex; align-items: center; gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qty-btn {
    width: 36px; height: 36px;
    background: none; border: none;
    color: var(--text);
    font-size: 18px; font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }

  .qty-btn:active { background: var(--border); }

  .qty-num {
    min-width: 30px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* ─── RESUMEN PEDIDO FLOTANTE ─── */
  .pedido-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  }

  .pedido-resumen {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
  }

  .pedido-resumen .total-label { color: var(--text2); }
  .pedido-resumen .total-valor { font-size: 16px; font-weight: 600; color: var(--text); }
  .pedido-resumen .items-count { font-size: 11px; color: var(--text3); }

  .cliente-field {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .cliente-field input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition);
  }

  .cliente-field input:focus { border-color: var(--green-light); }
  .cliente-field input::placeholder { color: var(--text3); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 13px;
  }

  .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 1000;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  #toast.visible { opacity: 1; }

  /* ─── LOADING ─── */
  .loading-state {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    padding: 40px;
    color: var(--text2);
    font-size: 13px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--green-light);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<!-- ─── TOAST ─── -->
<div id="toast"></div>

<script>
// ─── SUPABASE CONFIG ───────────────────────────────────────────────────────
const SUPABASE_URL = "https://hxmodeduckuhvvspnkxd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ESxhljLgqWkGvrnKhvbeEg_iBqaGciv";
const RESTAURANT_SLUG = "restaurante-la-26";

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── ESTADO GLOBAL ────────────────────────────────────────────────────────
const state = {
  restaurantId: null,
  meseroNombre: '',
  meseroCargo: '',
  mesas: [],          // [{id, table_number, name, capacity, ...}]
  ordenes: [],        // pedidos activos
  orderItems: [],     // ítems de pedidos activos
  menuItems: [],      // items del menú
  dailyMenuId: null,
  mesaSeleccionada: null,
  carrito: {},        // {menuItemId: {nombre, precio, cantidad, itemType, dailyMenuSlotId}}
  timerInterval: null,
};

// ─── PINes ────────────────────────────────────────────────────────────────
const PINES = {
  '1111': { nombre: 'Mesero 1', cargo: 'Mesero' },
  '2222': { nombre: 'Mesero 2', cargo: 'Mesero' },
  '3333': { nombre: 'Mesero 3', cargo: 'Mesero' },
  '0000': { nombre: 'Supervisor', cargo: 'Supervisor' },
};

// ─── LOGIN ────────────────────────────────────────────────────────────────
const pinInputs = [
  document.getElementById('p1'),
  document.getElementById('p2'),
  document.getElementById('p3'),
  document.getElementById('p4'),
];

pinInputs.forEach((inp, i) => {
  inp.addEventListener('input', e => {
    const val = e.target.value.replace(/\D/g, '');
    e.target.value = val ? val[0] : '';
    if (val && i < 3) pinInputs[i + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) pinInputs[i - 1].focus();
    if (e.key === 'Enter') doLogin();
  });
});

document.getElementById('login-nombre').addEventListener('keydown', e => {
  if (e.key === 'Enter') pinInputs[0].focus();
});

document.getElementById('btn-login').addEventListener('click', doLogin);

function doLogin() {
  const nombre = document.getElementById('login-nombre').value.trim();
  const pin = pinInputs.map(i => i.value).join('');
  const err = document.getElementById('login-error');

  if (!nombre) { err.textContent = 'Escribe tu nombre para continuar.'; return; }
  if (pin.length < 4) { err.textContent = 'Ingresa tu PIN de 4 dígitos.'; return; }

  const mesero = PINES[pin];
  if (!mesero) { err.textContent = 'PIN incorrecto. Intenta de nuevo.'; return; }

  err.textContent = '';
  state.meseroNombre = nombre;
  state.meseroCargo = mesero.cargo;
  sessionStorage.setItem('mesero', JSON.stringify({ meseroNombre: nombre, meseroCargo: mesero.cargo }));

  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  document.getElementById('tb-nombre').textContent = nombre;
  document.getElementById('tb-cargo').textContent = mesero.cargo;

  iniciarApp();
}

document.getElementById('btn-logout').addEventListener('click', () => {
  sessionStorage.removeItem('mesero');
  location.reload();
});

// Restaurar sesión
(function() {
  const saved = sessionStorage.getItem('mesero');
  if (saved) {
    try {
      const { meseroNombre, meseroCargo } = JSON.parse(saved);
      state.meseroNombre = meseroNombre;
      state.meseroCargo = meseroCargo;
      document.getElementById('login-screen').style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'flex';
      document.getElementById('tb-nombre').textContent = meseroNombre;
      document.getElementById('tb-cargo').textContent = meseroCargo;
      iniciarApp();
    } catch(e) { /* nada */ }
  }
})();

// ─── INICIAR APP ──────────────────────────────────────────────────────────
async function iniciarApp() {
  await resolverRestaurant();
  await cargarDatos();
  renderMesas();
  suscribirRealtime();
  iniciarTimer();
}

async function resolverRestaurant() {
  const { data } = await sb
    .from('restaurants')
    .select('id')
    .eq('slug', RESTAURANT_SLUG)
    .maybeSingle();
  state.restaurantId = data?.id;
}

async function cargarDatos() {
  if (!state.restaurantId) return;

  const hoy = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Bogota' });
  const ahora = new Date();
  const hoyComienzo = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate()).toISOString();

  // Mesas
  const { data: mesas } = await sb
    .from('tables')
    .select('*')
    .eq('restaurant_id', state.restaurantId)
    .order('table_number');
  state.mesas = mesas || [];

  // Menú del día
  const { data: menuDia } = await sb
    .from('daily_menus')
    .select('id')
    .eq('restaurant_id', state.restaurantId)
    .eq('menu_date', hoy)
    .eq('is_published', true)
    .maybeSingle();
  state.dailyMenuId = menuDia?.id || null;

  // Menu items
  if (state.dailyMenuId) {
    const { data: slots } = await sb
      .from('daily_menu_slots')
      .select(`
        id,
        item_type,
        menu_item:menu_items(id, name, base_price, is_active, description, item_type)
      `)
      .eq('daily_menu_id', state.dailyMenuId)
      .eq('is_available', true);
    state.menuItems = (slots || []).map(s => ({
      id: s.menu_item?.id,
      name: s.menu_item?.name,
      base_price: s.menu_item?.base_price,
      is_active: s.menu_item?.is_active,
      item_type: s.item_type || s.menu_item?.item_type,
      daily_menu_slot_id: s.id,
    })).filter(x => x.id);
  } else {
    const { data: items } = await sb
      .from('menu_items')
      .select('*')
      .eq('restaurant_id', state.restaurantId)
      .eq('is_active', true);
    state.menuItems = (items || []).map(i => ({ ...i, daily_menu_slot_id: null }));
  }

  // Pedidos activos del día
  const { data: ordenes } = await sb
    .from('orders')
    .select('*')
    .eq('restaurant_id', state.restaurantId)
    .not('status', 'in', '("delivered","cancelled")')
    .gte('created_at', hoyComienzo);
  state.ordenes = ordenes || [];

  // Items de esos pedidos
  if (state.ordenes.length > 0) {
    const orderIds = state.ordenes.map(o => o.id);
    const { data: items } = await sb
      .from('order_items')
      .select('*')
      .in('order_id', orderIds);
    state.orderItems = items || [];
  } else {
    state.orderItems = [];
  }
}

// ─── RENDER MESAS ─────────────────────────────────────────────────────────
function renderMesas() {
  const grid = document.getElementById('mesas-grid');
  const count = document.getElementById('mesas-count');

  if (!state.mesas.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🍽️</div><div>No se encontraron mesas</div></div>`;
    return;
  }

  count.textContent = `${state.mesas.length} mesas`;
  grid.innerHTML = '';

  state.mesas.forEach((mesa, idx) => {
    const card = crearTarjetaMesa(mesa, idx);
    grid.appendChild(card);
  });
}

function crearTarjetaMesa(mesa, idx) {
  const { estado, emoji, label } = calcularEstadoMesa(mesa.id);
  const ultimoPedido = getUltimoPedidoMesa(mesa.id);
  const itemsCount = contarItemsMesa(mesa.id);
  const clienteNombre = ultimoPedido?.customer_name || '';
  const timerInfo = ultimoPedido ? calcularTimer(ultimoPedido.created_at) : null;

  const card = document.createElement('div');
  card.className = `mesa-card estado-${estado}`;
  card.style.animationDelay = `${idx * 0.06}s`;
  card.dataset.mesaId = mesa.id;

  const nombreMesa = mesa.name
    ? `<div class="mesa-nombre">${mesa.name}</div>`
    : '';

  const clienteHtml = clienteNombre
    ? `<div class="mesa-cliente">👤 ${clienteNombre}</div>`
    : '';

  const timerHtml = timerInfo
    ? `<div class="mesa-timer ${timerInfo.clase}">${timerInfo.texto}</div>`
    : `<div class="mesa-timer">—</div>`;

  const itemsHtml = itemsCount > 0
    ? `<div class="mesa-items">${itemsCount} ítem${itemsCount > 1 ? 's' : ''}</div>`
    : '';

  card.innerHTML = `
    <div>
      <div class="mesa-numero">${mesa.table_number}</div>
      ${nombreMesa}
      <div class="mesa-estado-badge">${emoji} ${label}</div>
      ${clienteHtml}
    </div>
    <div class="mesa-footer">
      ${timerHtml}
      ${itemsHtml}
    </div>
  `;

  card.addEventListener('click', () => abrirDetalleMesa(mesa));
  return card;
}

function calcularEstadoMesa(mesaId) {
  const ordenes = state.ordenes.filter(o => o.table_id === mesaId);
  if (!ordenes.length) return { estado: 'libre', emoji: '🟢', label: 'Libre' };

  // Buscar orden en espera de cuenta
  if (ordenes.some(o => o.status === 'waiting_payment')) {
    return { estado: 'cuenta', emoji: '⚫', label: 'Cuenta' };
  }

  const allItems = state.orderItems.filter(i => ordenes.map(o => o.id).includes(i.order_id));

  if (!allItems.length) return { estado: 'pendiente', emoji: '🟡', label: 'Pendiente' };

  const statuses = allItems.map(i => i.item_status);
  const allReady = statuses.every(s => s === 'ready' || s === 'delivered');
  const anyPreparing = statuses.some(s => s === 'preparing');
  const allPending = statuses.every(s => s === 'pending');

  if (allReady) return { estado: 'listo', emoji: '🔴', label: 'Listo' };
  if (anyPreparing) return { estado: 'preparando', emoji: '🟠', label: 'Preparando' };
  if (allPending) return { estado: 'pendiente', emoji: '🟡', label: 'Pendiente' };
  return { estado: 'preparando', emoji: '🟠', label: 'Preparando' };
}

function getUltimoPedidoMesa(mesaId) {
  const ordenes = state.ordenes
    .filter(o => o.table_id === mesaId)
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  return ordenes[0] || null;
}

function contarItemsMesa(mesaId) {
  const ordenIds = state.ordenes.filter(o => o.table_id === mesaId).map(o => o.id);
  return state.orderItems
    .filter(i => ordenIds.includes(i.order_id))
    .reduce((sum, i) => sum + (i.quantity || 1), 0);
}

function calcularTimer(createdAt) {
  if (!createdAt) return null;
  const mins = Math.floor((Date.now() - new Date(createdAt)) / 60000);
  let texto = mins < 1 ? 'Ahora' : `${mins} min`;
  let clase = 'timer-verde';
  if (mins >= 5 && mins < 15) clase = 'timer-amarillo';
  else if (mins >= 15 && mins < 25) clase = 'timer-naranja';
  else if (mins >= 25) { clase = 'timer-rojo'; texto = `⚠️ ${mins} min`; }
  return { texto, clase };
}

// ─── TIMER AUTOMÁTICO ────────────────────────────────────────────────────
function iniciarTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    document.querySelectorAll('.mesa-card').forEach(card => {
      const mesaId = card.dataset.mesaId;
      const ultimoPedido = getUltimoPedidoMesa(mesaId);
      const timerEl = card.querySelector('.mesa-timer');
      if (timerEl && ultimoPedido) {
        const info = calcularTimer(ultimoPedido.created_at);
        if (info) {
          timerEl.textContent = info.texto;
          timerEl.className = `mesa-timer ${info.clase}`;
        }
      }
    });
  }, 30000);
}

// ─── DETALLE MESA ─────────────────────────────────────────────────────────
function abrirDetalleMesa(mesa) {
  state.mesaSeleccionada = mesa;

  document.getElementById('d-mesa-num').textContent = `Mesa ${mesa.table_number}`;
  document.getElementById('d-mesa-nombre').textContent = mesa.name || '';

  renderDetallePedidos(mesa.id);

  const overlay = document.getElementById('overlay');
  const drawer = document.getElementById('drawer');
  overlay.classList.add('visible');
  requestAnimationFrame(() => drawer.classList.add('open'));
}

function cerrarDrawer() {
  const overlay = document.getElementById('overlay');
  const drawer = document.getElementById('drawer');
  drawer.classList.remove('open');
  setTimeout(() => overlay.classList.remove('visible'), 320);
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) cerrarDrawer();
});
document.getElementById('btn-close-drawer').addEventListener('click', cerrarDrawer);

function renderDetallePedidos(mesaId) {
  const container = document.getElementById('d-pedidos-container');
  const ordenes = state.ordenes
    .filter(o => o.table_id === mesaId)
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  if (!ordenes.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🍽️</div><div>Sin pedidos activos en esta mesa</div></div>`;
    return;
  }

  container.innerHTML = ordenes.map(orden => {
    const items = state.orderItems.filter(i => i.order_id === orden.id);
    const statusLabel = {
      pending: 'Pendiente', preparing: 'Preparando',
      ready: 'Listo', delivered: 'Entregado',
    }[orden.status] || orden.status;

    const hora = new Date(orden.created_at).toLocaleTimeString('es-CO', {
      hour: '2-digit', minute: '2-digit', timeZone: 'America/Bogota'
    });

    const itemsHtml = items.map(item => {
      const nombre = item.notes?.match(/\[nombre\](.*)/)?.[1] || `Ítem #${item.menu_item_id?.slice(-4)}`;
      const dotClass = { pending: 'dot-pending', preparing: 'dot-preparing', ready: 'dot-ready', delivered: 'dot-delivered' }[item.item_status] || 'dot-pending';
      return `<div class="item-row">
        <div class="item-qty">${item.quantity}</div>
        <div class="item-nombre">${nombre}</div>
        <div class="item-status-dot ${dotClass}"></div>
      </div>`;
    }).join('');

    const total = orden.total_amount
      ? `$${Number(orden.total_amount).toLocaleString('es-CO')}`
      : items.reduce((s, i) => s + (i.unit_price * i.quantity), 0) > 0
        ? `$${items.reduce((s, i) => s + (i.unit_price * i.quantity), 0).toLocaleString('es-CO')}`
        : '—';

    return `<div class="pedido-card">
      <div class="pedido-header">
        <div>
          <div class="pedido-num">${orden.order_number || 'Pedido'}</div>
          <div class="pedido-hora">${hora}</div>
        </div>
        <div class="pedido-status-badge status-${orden.status}">${statusLabel}</div>
      </div>
      ${itemsHtml ? `<div class="pedido-items">${itemsHtml}</div>` : ''}
      <div class="pedido-total"><span>Total</span><strong>${total}</strong></div>
    </div>`;
  }).join('');
}

// ─── ACCIONES MESA ────────────────────────────────────────────────────────
document.getElementById('btn-nuevo-pedido').addEventListener('click', () => {
  cerrarDrawer();
  setTimeout(() => abrirVistaPedido(state.mesaSeleccionada), 350);
});

document.getElementById('btn-pedir-cuenta').addEventListener('click', async () => {
  const mesa = state.mesaSeleccionada;
  if (!mesa) return;
  const ordenes = state.ordenes.filter(o => o.table_id === mesa.id && o.status !== 'delivered');
  if (!ordenes.length) { mostrarToast('No hay pedidos activos en esta mesa'); return; }

  for (const orden of ordenes) {
    await sb.from('orders').update({ status: 'waiting_payment' }).eq('id', orden.id);
    const o = state.ordenes.find(x => x.id === orden.id);
    if (o) o.status = 'waiting_payment';
  }
  cerrarDrawer();
  actualizarTarjetaMesa(mesa.id);
  mostrarToast('Cuenta solicitada ✓');
});

document.getElementById('btn-liberar-mesa').addEventListener('click', async () => {
  const mesa = state.mesaSeleccionada;
  if (!mesa) return;
  const ordenes = state.ordenes.filter(o => o.table_id === mesa.id);
  for (const orden of ordenes) {
    await sb.from('orders').update({ status: 'delivered' }).eq('id', orden.id);
  }
  state.ordenes = state.ordenes.filter(o => o.table_id !== mesa.id);
  state.orderItems = state.orderItems.filter(i =>
    !ordenes.map(o => o.id).includes(i.order_id)
  );
  cerrarDrawer();
  actualizarTarjetaMesa(mesa.id);
  mostrarToast('Mesa liberada ✓');
});

// ─── VISTA TOMAR PEDIDO ───────────────────────────────────────────────────
function abrirVistaPedido(mesa) {
  state.carrito = {};
  document.getElementById('vp-mesa-label').textContent = `Mesa ${mesa.table_number}${mesa.name ? ' · ' + mesa.name : ''}`;
  document.getElementById('vp-cliente-nombre').value = '';
  renderMenuPedido();
  actualizarResumenCarrito();

  const vp = document.getElementById('vista-pedido');
  vp.style.display = 'flex';
  requestAnimationFrame(() => vp.style.opacity = '1');
}

function cerrarVistaPedido() {
  document.getElementById('vista-pedido').style.display = 'none';
}

document.getElementById('btn-back-pedido').addEventListener('click', () => {
  cerrarVistaPedido();
  if (state.mesaSeleccionada) abrirDetalleMesa(state.mesaSeleccionada);
});

function renderMenuPedido() {
  const content = document.getElementById('pedido-menu-content');

  if (!state.menuItems.length) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div>No hay menú disponible hoy</div></div>`;
    return;
  }

  const categorias = {};
  const catLabels = {
    executive_lunch: '🍱 Almuerzo ejecutivo',
    a_la_carte: '🍽️ A la carta',
    drink: '🥤 Bebidas',
    dessert: '🍮 Postres',
    side: '🥗 Acompañamientos',
  };

  state.menuItems.forEach(item => {
    const cat = item.item_type || 'a_la_carte';
    if (!categorias[cat]) categorias[cat] = [];
    categorias[cat].push(item);
  });

  const orden = ['executive_lunch', 'a_la_carte', 'drink', 'dessert', 'side'];
  const cats = Object.keys(categorias).sort((a, b) => {
    const ia = orden.indexOf(a), ib = orden.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  content.innerHTML = cats.map(cat => {
    const items = categorias[cat];
    const label = catLabels[cat] || cat;
    const itemsHtml = items.map(item => {
      const agotado = !item.is_active;
      const precio = item.base_price ? `$${Number(item.base_price).toLocaleString('es-CO')}` : '';
      return `<div class="menu-item" data-item-id="${item.id}">
        <div class="menu-item-info">
          <div class="menu-item-nombre">${item.name || '—'}${agotado ? ' <span style="color:#f06050;font-size:10px">AGOTADO</span>' : ''}</div>
          ${precio ? `<div class="menu-item-precio">${precio}</div>` : ''}
        </div>
        <div class="qty-control">
          <button class="qty-btn btn-menos" data-id="${item.id}" ${agotado ? 'disabled' : ''}>−</button>
          <div class="qty-num" id="qty-${item.id}">0</div>
          <button class="qty-btn btn-mas" data-id="${item.id}" ${agotado ? 'disabled' : ''}>+</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="menu-categoria">
      <div class="cat-titulo">${label}</div>
      ${itemsHtml}
    </div>`;
  }).join('');

  // Eventos
  content.querySelectorAll('.btn-mas').forEach(btn => {
    btn.addEventListener('click', () => cambiarCantidad(btn.dataset.id, 1));
  });
  content.querySelectorAll('.btn-menos').forEach(btn => {
    btn.addEventListener('click', () => cambiarCantidad(btn.dataset.id, -1));
  });
}

function cambiarCantidad(itemId, delta) {
  const item = state.menuItems.find(x => x.id === itemId);
  if (!item) return;
  const actual = state.carrito[itemId]?.cantidad || 0;
  const nueva = Math.max(0, actual + delta);

  if (nueva === 0) {
    delete state.carrito[itemId];
  } else {
    state.carrito[itemId] = {
      nombre: item.name,
      precio: item.base_price || 0,
      cantidad: nueva,
      itemType: item.item_type,
      dailyMenuSlotId: item.daily_menu_slot_id,
    };
  }

  const qtyEl = document.getElementById(`qty-${itemId}`);
  if (qtyEl) qtyEl.textContent = nueva;
  actualizarResumenCarrito();
}

function actualizarResumenCarrito() {
  const items = Object.values(state.carrito);
  const totalItems = items.reduce((s, i) => s + i.cantidad, 0);
  const totalPrecio = items.reduce((s, i) => s + i.precio * i.cantidad, 0);

  document.getElementById('vp-items-count').textContent = `${totalItems} ítem${totalItems !== 1 ? 's' : ''}`;
  document.getElementById('vp-total').textContent = `$${totalPrecio.toLocaleString('es-CO')}`;

  const btn = document.getElementById('btn-confirmar-pedido');
  btn.disabled = totalItems === 0;
}

document.getElementById('btn-confirmar-pedido').addEventListener('click', confirmarPedido);

async function confirmarPedido() {
  const mesa = state.mesaSeleccionada;
  if (!mesa) return;

  const items = Object.entries(state.carrito);
  if (!items.length) { mostrarToast('Agrega al menos un ítem'); return; }

  const btn = document.getElementById('btn-confirmar-pedido');
  btn.disabled = true;
  btn.textContent = 'Enviando…';

  const clienteNombre = document.getElementById('vp-cliente-nombre').value.trim() || state.meseroNombre;
  const total = items.reduce((s, [, v]) => s + v.precio * v.cantidad, 0);

  try {
    const { data: orden, error: errOrden } = await sb
      .from('orders')
      .insert([{
        restaurant_id: state.restaurantId,
        table_id: mesa.id,
        order_number: `MES-LA26-${Date.now()}`,
        status: 'pending',
        customer_name: clienteNombre,
        notes: `[Mesa ${mesa.table_number}] [Mesero: ${state.meseroNombre}]`,
        total_amount: total,
        daily_menu_id: state.dailyMenuId || null,
      }])
      .select('id')
      .single();

    if (errOrden) throw errOrden;

    const orderItemsData = items.map(([menuItemId, v]) => ({
      order_id: orden.id,
      menu_item_id: menuItemId,
      quantity: v.cantidad,
      unit_price: v.precio,
      item_status: 'pending',
      notes: `[nombre]${v.nombre}`,
    }));

    const { error: errItems } = await sb.from('order_items').insert(orderItemsData);
    if (errItems) throw errItems;

    mostrarToast('✅ Pedido enviado a cocina');
    cerrarVistaPedido();

    // Actualizar estado local
    await cargarDatos();
    renderMesas();

    if (state.mesaSeleccionada) {
      abrirDetalleMesa(state.mesaSeleccionada);
    }
  } catch (err) {
    console.error(err);
    mostrarToast('⚠️ Error al enviar el pedido');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirmar pedido →';
  }
}

// ─── REALTIME ─────────────────────────────────────────────────────────────
function suscribirRealtime() {
  sb.channel('panel-mesero')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, async (payload) => {
      await sincronizarOrden(payload);
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' }, async (payload) => {
      await sincronizarOrderItem(payload);
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'menu_items' }, (payload) => {
      manejarMenuItemActualizado(payload.new);
    })
    .subscribe();
}

async function sincronizarOrden(payload) {
  const { eventType, new: nueva, old } = payload;
  if (eventType === 'INSERT') {
    if (nueva.restaurant_id === state.restaurantId) {
      state.ordenes = state.ordenes.filter(o => o.id !== nueva.id);
      state.ordenes.push(nueva);
    }
  } else if (eventType === 'UPDATE') {
    const idx = state.ordenes.findIndex(o => o.id === nueva.id);
    if (idx >= 0) state.ordenes[idx] = nueva;
    else if (nueva.restaurant_id === state.restaurantId) state.ordenes.push(nueva);
  } else if (eventType === 'DELETE') {
    state.ordenes = state.ordenes.filter(o => o.id !== old.id);
  }

  if (nueva?.table_id) actualizarTarjetaMesa(nueva.table_id);
  else if (old?.table_id) actualizarTarjetaMesa(old.table_id);
}

async function sincronizarOrderItem(payload) {
  const { eventType, new: nuevo, old } = payload;
  if (eventType === 'INSERT') {
    state.orderItems = state.orderItems.filter(i => i.id !== nuevo.id);
    state.orderItems.push(nuevo);
  } else if (eventType === 'UPDATE') {
    const idx = state.orderItems.findIndex(i => i.id === nuevo.id);
    if (idx >= 0) state.orderItems[idx] = nuevo;
    else state.orderItems.push(nuevo);

    // Revisar si todos los items de la orden están listos
    const orden = state.ordenes.find(o => o.id === nuevo.order_id);
    if (orden) {
      const todosItems = state.orderItems.filter(i => i.order_id === orden.id);
      const todosListos = todosItems.every(i => i.item_status === 'ready' || i.item_status === 'delivered');
      if (todosListos && todosItems.length > 0) {
        // Vibrar en móvil
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        const mesa = state.mesas.find(m => m.id === orden.table_id);
        const numMesa = mesa ? `Mesa ${mesa.table_number}` : 'Una mesa';
        mostrarToast(`🔔 ${numMesa} — pedido listo para servir`);
      }
      actualizarTarjetaMesa(orden.table_id);
    }
  } else if (eventType === 'DELETE') {
    state.orderItems = state.orderItems.filter(i => i.id !== old.id);
  }
}

function manejarMenuItemActualizado(item) {
  if (!item.is_active) {
    mostrarAlertaAgotado(item.name || 'Un plato');
    // Actualizar en state
    const idx = state.menuItems.findIndex(m => m.id === item.id);
    if (idx >= 0) state.menuItems[idx].is_active = false;
  }
}

// ─── ACTUALIZAR TARJETA ───────────────────────────────────────────────────
function actualizarTarjetaMesa(mesaId) {
  const mesa = state.mesas.find(m => m.id === mesaId);
  if (!mesa) return;

  const grid = document.getElementById('mesas-grid');
  const cardActual = grid.querySelector(`[data-mesa-id="${mesaId}"]`);
  if (!cardActual) return;

  const idx = Array.from(grid.children).indexOf(cardActual);
  const nuevaCard = crearTarjetaMesa(mesa, idx);
  // Preservar animación original
  nuevaCard.style.animation = 'none';
  grid.replaceChild(nuevaCard, cardActual);

  // Si el drawer está abierto con esta mesa, actualizar también
  if (state.mesaSeleccionada?.id === mesaId) {
    renderDetallePedidos(mesaId);
  }
}

// ─── ALERTAS AGOTADOS ────────────────────────────────────────────────────
function mostrarAlertaAgotado(nombre) {
  const container = document.getElementById('alertas-container');
  const el = document.createElement('div');
  el.className = 'alerta-item';
  el.innerHTML = `
    <div class="alerta-icon">⚠️</div>
    <div class="alerta-msg">"${nombre}" se agotó — no disponible</div>
    <button class="alerta-dismiss" aria-label="Descartar">✕</button>
  `;
  el.querySelector('.alerta-dismiss').addEventListener('click', () => {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  });
  container.prepend(el);
  // Auto-dismiss en 8 seg
  setTimeout(() => {
    if (el.parentNode) {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(() => el.remove(), 300);
    }
  }, 8000);
}

// ─── TOAST ───────────────────────────────────────────────────────────────
let toastTimeout;
function mostrarToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('visible'), 3000);
}
</script>
